name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & publish ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macos-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux deps
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev
      - run: npm ci
      - name: Build Tauri
        run: npm run tauri:build || true
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cyonima-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/Cyonima*
            src-tauri/target/release/cyonima*