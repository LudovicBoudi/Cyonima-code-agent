# Cyonima — catalogue de modèles téléchargeables
#
# Format parsé par src-tauri/src/models/. Chaque entrée expose :
#   id           : identifiant stable (utilisé en IPC et dans la config)
#   name         : libellé affiché
#   url          : URL HTTP du GGUF (HuggingFace, OLLibrary, miroir GitHub Releases)
#   sha256       : checksum attendu post-download
#   size_bytes   : taille du fichier GGUF (0 si non vérifié)
#   quantization : Q4_K_M / Q5_K_M / Q8_0 / F16 ...
#   license      : licence courte affichée avant téléchargement
#   ram_min_gb   : RAM minimum recommandée pour l'inférence (CPU pur)
#                  NB: si GPU est détecté (VRAM ≥ taille modèle), une bonne
#                  partie des poids vont en VRAM et la ram_min_gb peut être
#                  réduite. Câblage VRAM prévu en J1.5/J8.
#
# Cibles hardware de base (référence entreprise attendue ≥):
#   - Entry    : 8 Go RAM, no VRAM     → modèles 1.5B-3B Q4
#   - Mid      : 16 Go RAM, 8 Go VRAM  → modèles 7B-12B Q4/Q5
#   - High     : 32 Go RAM, 16 Go VRAM  → modèles 12B-27B Q4, 70B Q2/Q3 (lent)
#   - Server   : 64+ Go RAM, 24+ Go VRAM → 70B Q4/Q5, 405B Q2 (très lent)
#
# Ne jamais committer de GGUF > 50 Mo dans ce repo ; tout passe par download.

