# Cyonima — catalogue de modèles téléchargeables via Ollama
#
# Format parsé par src-tauri/src/models/. Chaque entrée expose :
#   id           : identifiant stable (utilisé en IPC et dans la config)
#   name         : libellé affiché
#   quantization : Q4_K_M / Q5_K_M / Q8_0 / F16 ...
#   license      : licence courte affichée avant téléchargement
#   ram_min_gb   : RAM minimum recommandée pour l'inférence (CPU pur)
#   model_type   : type du modèle ("general" pour généraliste, "coding" pour orienté code)
#   ollama_tag   : tag Ollama pour pull direct (ex: "qwen2.5:7b"). OBLIGATOIRE.
#
# IMPORTANT : Seuls les modèles avec ollama_tag sont inclus.
# Les téléchargements se font exclusivement via `ollama pull`.

